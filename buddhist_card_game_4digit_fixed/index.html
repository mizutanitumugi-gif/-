<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>仏教カードゲーム</title><link rel="stylesheet" href="style.css"></head><body>
<div id="titleScreen" class="titleScreen">
  <div class="titleBox">
    <h1>仏教カードゲーム</h1>
    <p>開祖を選び、宗派をつなぎ、悟りポイント49ぴったりを目指そう。</p>
    <h2>難易度を選択</h2>
    <div class="difficultyBtns">
      <button data-diff="easy">初級<br><small>小田チビオ</small></button>
      <button data-diff="normal">中級<br><small>中山チュウタロウ</small></button>
      <button data-diff="master">上級<br><small>上野ジョー</small></button>
      <button data-diff="ray">超級<br><small>カードマスター水谷RAY</small></button>
    </div>
    <div class="titleMenuBtns"><button id="titleRules" class="subBtn">ルールを見る</button><button id="cardBook" class="subBtn">カード図鑑</button></div>
  </div>
</div>
<div id="app">
<header><h1>仏教カードゲーム</h1><div class="topBtns"><button id="backTitle">タイトルへ</button><button id="newGame">同じ難易度で再戦</button><button id="showRules">ルール</button></div></header>
<main>
<section class="board player"><h2>あなた <span id="yourTurn"></span></h2><div class="sectPanel mySect"><b>あなたの宗派</b><div id="playerSects"></div></div><div class="founders" id="playerFounders"></div><div class="score"><span>悟りポイント</span><b id="playerScore">0 / 49</b><div class="bar"><i id="playerBar"></i></div><small>GOAL 49</small></div></section>
<section class="center"><div id="message">タイトルから難易度を選んでください</div><div class="deckArea"><button id="drawBtn">山札から1枚引く</button><div class="deckCard"><span id="deckCount">0</span><small>山札</small></div></div><div class="goal">GOAL 49 ぴったりで勝利</div><div class="playedWrap"><h3>出し終わったカード</h3><div id="playedPile" class="playedPile"><span class="emptyPlayed">まだカードは使われていません</span></div></div><div id="effectLayer"></div></section>
<section class="board enemy"><h2>相手 <span id="cpuName"></span> <span id="cpuTurn"></span></h2><div class="sectPanel"><b>相手の宗派</b><div id="cpuSects"></div></div><div class="founders" id="cpuFounders"></div><div class="score"><span>悟りポイント</span><b id="cpuScore">0 / 49</b><div class="bar"><i id="cpuBar"></i></div><small>GOAL 49</small></div></section>
</main>
<section class="handWrap"><h2>手札</h2><div id="hand" class="hand"></div></section>
</div>
<div id="modal" class="modal hidden"><div class="modalBox"><h2 id="modalTitle"></h2><p id="modalText"></p><div id="modalOptions"></div></div></div><script src="cards.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script><script src="game.js"></script><script src="online.js"></script></body></html>
